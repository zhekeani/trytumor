services:
  auth:
    build:
      context: .
      dockerfile: ./apps/auth/Dockerfile
    # Mount the root directory
    volumes:
      - .:/usr/src/app
    # Overide the CMD to start dev server
    command: npm run start:dev auth
    env_file:
      - ./apps/auth/.env
    ports:
      - '3001:3001'
  mongo-auth:
    image: mongo

  patients:
    build:
      context: .
      dockerfile: ./apps/patients/Dockerfile
    volumes:
      - .:/usr/src/app
    command: npm run start:dev patients
    env_file:
      - ./apps/patients/.env
    ports:
      - '3002:3002'
  mongo-patients:
    image: mongo

  predictions:
    build:
      context: .
      dockerfile: ./apps/predictions/Dockerfile
    volumes:
      - .:/usr/src/app
    command: npm run start:dev predictions
    env_file:
      - ./apps/predictions/.env
    ports:
      - '3003:3003'
  mongo-predictions:
    image: mongo
